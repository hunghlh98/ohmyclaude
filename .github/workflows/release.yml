name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-and-release:
    name: Validate & Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Version consistency check ───────────────────────────────────────────
      - name: Extract tag version
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Validate tag format
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          if ! echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must be vX.Y.Z format, got: v$TAG"
            exit 1
          fi

      - name: Check VERSION file matches tag
        run: |
          FILE_VER="$(cat VERSION | tr -d '[:space:]')"
          TAG_VER="${{ steps.tag.outputs.version }}"
          if [ "$FILE_VER" != "$TAG_VER" ]; then
            echo "::error::VERSION file ($FILE_VER) does not match tag ($TAG_VER)"
            exit 1
          fi

      - name: Check plugin.json version matches tag
        run: |
          PLUGIN_VER="$(node -e "console.log(require('./.claude-plugin/plugin.json').version)")"
          TAG_VER="${{ steps.tag.outputs.version }}"
          if [ "$PLUGIN_VER" != "$TAG_VER" ]; then
            echo "::error::plugin.json version ($PLUGIN_VER) does not match tag ($TAG_VER)"
            exit 1
          fi

      - name: Check package.json version matches tag
        run: |
          PKG_VER="$(node -e "console.log(require('./package.json').version)")"
          TAG_VER="${{ steps.tag.outputs.version }}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::package.json version ($PKG_VER) does not match tag ($TAG_VER)"
            exit 1
          fi

      # ── Plugin validation ───────────────────────────────────────────────────
      - name: Run plugin validation
        run: node scripts/validate.js

      # ── Build release notes ─────────────────────────────────────────────────
      - name: Count agents/skills/commands
        id: counts
        run: |
          AGENTS=$(ls agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          SKILLS=$(ls -d skills/*/  2>/dev/null | wc -l | tr -d ' ')
          COMMANDS=$(ls commands/*.md 2>/dev/null | wc -l | tr -d ' ')
          echo "agents=$AGENTS"   >> $GITHUB_OUTPUT
          echo "skills=$SKILLS"   >> $GITHUB_OUTPUT
          echo "commands=$COMMANDS" >> $GITHUB_OUTPUT

      - name: Generate release highlights
        id: highlights
        run: |
          cat > /tmp/highlights.md << 'EOF'
          ## ohmyclaude ${{ steps.tag.outputs.version }}

          **${{ steps.counts.outputs.agents }} agents** · **${{ steps.counts.outputs.skills }} skills** · **${{ steps.counts.outputs.commands }} commands**

          ### Install

          ```
          claude plugin install hunghlh98/ohmyclaude
          ```

          Then run once inside Claude Code:

          ```
          /setup
          ```

          ### Quick Start

          ```
          /forge request <task>   # route and triage a new request
          /forge sprint           # run the current sprint through the pipeline
          /review                 # code review
          ```
          EOF
          echo "file=/tmp/highlights.md" >> $GITHUB_OUTPUT

      # ── Create GitHub release ───────────────────────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "ohmyclaude v${{ steps.tag.outputs.version }}"
          body_path: ${{ steps.highlights.outputs.file }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
